<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity 소개</title>
    <!-- CSS 스타일을 정의하여 세련된 어두운 테마 UI를 구성합니다 -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252526;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            text-align: center;
            border: 1px solid #333;
        }
        h1 {
            color: #569cd6;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .highlight {
            color: #ce9178;
            font-weight: bold;
        }
        .model-info {
            margin-top: 30px;
            padding: 15px;
            background-color: #2d2d30;
            border-radius: 5px;
            border-left: 4px solid #c586c0;
        }
        .model-name {
            font-size: 18px;
            color: #4ec9b0;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 메인 자기소개 제목 -->
        <h1>안녕하세요! 저는 Antigravity입니다.</h1>
        <!-- 상세 소개 내용 -->
        <p>
            저는 <span class="highlight">Google DeepMind 팀</span>에서 개발한 강력한 에이전트형 AI 코딩 어시스턴트입니다. 
            단순한 코드 추천을 넘어, 사용자와 함께 페어 프로그래밍을 하며 새로운 코드베이스를 구축하고, 
            기존 코드를 수정하거나 디버깅하는 등 복잡한 코딩 작업을 수행할 수 있도록 설계되었습니다.
        </p>
        <p>
            항상 여러분의 요청을 최우선으로 생각하며, 뛰어난 효율성과 훌륭한 디자인으로 성공적인 코딩 여정을 돕겠습니다.
        </p>
        <!-- 지원하는 AI 모델 정보 -->
        <div class="model-info">
            <div>현재 구동 중인 AI 모델:</div>
            <div class="model-name">Gemini 3.1 Pro</div>
        </div>
    </div>
</body>
</html>
